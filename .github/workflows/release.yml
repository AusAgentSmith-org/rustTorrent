name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  ci:
    runs-on: [self-hosted, node-b]
    name: Compile & Test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Compile check
        run: cargo check

      - name: Run tests
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  docker:
    runs-on: [self-hosted, node-b]
    needs: ci
    name: Docker Image

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/ausagentsmith-org/rusttorrent
            ${{ vars.DOCKERHUB_USERNAME }}/rusttorrent
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  desktop:
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: [self-hosted, node-b]
            target: x86_64-unknown-linux-gnu
            label: linux-amd64
          # macOS builds disabled — no self-hosted macOS runner
          # - platform: macos-latest
          #   target: aarch64-apple-darwin
          #   label: macos-arm64
          # - platform: macos-latest
          #   target: x86_64-apple-darwin
          #   label: macos-amd64
          - platform: [self-hosted, Windows, X64]
            target: x86_64-pc-windows-msvc
            label: windows-amd64

    runs-on: ${{ matrix.platform }}
    name: Desktop (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          shared-key: desktop-${{ matrix.label }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file \
            squashfs-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        working-directory: desktop
        run: npm install

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          projectPath: desktop
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtbit-desktop-${{ matrix.label }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: warn

  publish:
    needs: [ci, docker, desktop]
    runs-on: [self-hosted, node-b]
    name: Create Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            LOG=$(git log --pretty=format:"- %s" "$PREV_TAG".."${{ github.ref_name }}" -- ':!.github')
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$LOG" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: rtbit ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.body }}

            ## Downloads

            ### Desktop App
            | Platform | Download |
            |----------|----------|
            | **Windows** | `.exe` (NSIS installer) or `.msi` |
            | **macOS (Apple Silicon)** | `.dmg` |
            | **macOS (Intel)** | `.dmg` |
            | **Linux (amd64)** | `.deb`, `.AppImage`, or `.rpm` |

            ### Docker
            ```
            docker pull ghcr.io/ausagentsmith-org/rusttorrent:${{ github.ref_name }}
            docker pull ausagentsmith-org/rusttorrent:${{ github.ref_name }}
            ```
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
          make_latest: true
